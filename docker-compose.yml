version: "3.8"

services:
  weaviate:
    image: semitechnologies/weaviate:1.27.1
    ports:
      - "${WEAVIATE_PORT}:${WEAVIATE_PORT}"
      - "${WEAVIATE_GRPC_PORT}:${WEAVIATE_GRPC_PORT}"
    restart: on-failure
    env_file:
      - .env
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: "node1"
      LOG_LEVEL: "warning"
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${WEAVIATE_PORT}/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    restart: on-failure
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/seeds/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  chatbot:
    build:
      context: ./chatbot
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    restart: on-failure
    env_file:
      - .env
    depends_on:
      weaviate:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      # Allow parking_info.md updates without rebuilding the image
      - ./chatbot/data:/app/data:ro
    stdin_open: true
    tty: true

  admin_api:
    build:
      context: ./admin_api
      dockerfile: Dockerfile
      target: production
    ports:
      - "${ADMIN_API_PORT}:${ADMIN_API_PORT}"
    restart: on-failure
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  weaviate_data:
  postgres_data:
